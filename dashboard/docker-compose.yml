services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bugbounty
      POSTGRES_USER: bugbounty
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.docker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bugbounty"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    environment:
      DATABASE_URL: postgresql://bugbounty:${POSTGRES_PASSWORD}@db:5432/bugbounty
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  scanner:
    build:
      context: ..
      dockerfile: Dockerfile.scanner
    restart: unless-stopped
    environment:
      INTIGRITI_API_TOKEN: ${INTIGRITI_API_TOKEN:-}
      SCAN_SERVICE_PORT: "8000"
    volumes:
      - scan-reports:/app/reports

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      DATABASE_URL: postgresql://bugbounty:${POSTGRES_PASSWORD}@db:5432/bugbounty
      SCAN_SERVICE_URL: http://scanner:8000
      OLLAMA_URL: http://ollama:11434
      INTIGRITI_API_TOKEN: ${INTIGRITI_API_TOKEN:-}
      DASHBOARD_TOKEN: ${DASHBOARD_TOKEN:-}
      DASHBOARD_URL: http://dashboard:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      scanner:
        condition: service_started
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  scan-reports:
  ollama-data:
