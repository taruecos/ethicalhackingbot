services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bugbounty
      POSTGRES_USER: bugbounty
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bugbounty_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bugbounty"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    environment:
      DATABASE_URL: postgresql://bugbounty:${POSTGRES_PASSWORD:-bugbounty_secret}@db:5432/bugbounty
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://bugbounty:${POSTGRES_PASSWORD:-bugbounty_secret}@db:5432/bugbounty
      BOT_API_URL: http://host.docker.internal:8000
      DASHBOARD_TOKEN: ${DASHBOARD_TOKEN:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

volumes:
  pgdata:
